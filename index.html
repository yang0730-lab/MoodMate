<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MoodMate Pro</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin:0;
    font-family: Arial;
    background: linear-gradient(135deg,#d7f5f2,#e6ffe6);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.app {
    width:380px;
    background:white;
    border-radius:20px;
    padding:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h1 {
    text-align:center;
}

.chat {
    height:180px;
    overflow-y:auto;
    background:#f5f5f5;
    border-radius:10px;
    padding:10px;
}

.msg {
    margin:5px 0;
}

.user {
    text-align:right;
    color:#333;
}

.ai {
    text-align:left;
    color:#2b6f6b;
}

input {
    width:100%;
    padding:10px;
    border-radius:10px;
    border:1px solid #ccc;
    margin-top:10px;
}

button {
    width:100%;
    padding:10px;
    margin-top:5px;
    border:none;
    border-radius:10px;
    background:#4ecdc4;
    color:white;
    font-weight:bold;
}

canvas {
    margin-top:15px;
}
</style>
</head>

<body>

<div class="app">
<h1>🌿 MoodMate Pro</h1>

<div class="chat" id="chat"></div>

<input id="input" placeholder="Type your feelings...">
<button onclick="send()">Send</button>

<canvas id="chart"></canvas>

</div>

<script>
let data = JSON.parse(localStorage.getItem("moodData")) || {
happy:0,
sad:0,
angry:0,
tired:0,
neutral:0
};

let chart;

function send(){
let text = document.getElementById("input").value;
if(!text) return;

let chat = document.getElementById("chat");

chat.innerHTML += `<div class="msg user">${text}</div>`;

let mood = detectMood(text);
data[mood]++;

let reply = generateReply(mood);

chat.innerHTML += `<div class="msg ai">${reply}</div>`;

localStorage.setItem("moodData", JSON.stringify(data));

drawChart();

document.getElementById("input").value="";
chat.scrollTop = chat.scrollHeight;
}

function detectMood(text){
text = text.toLowerCase();

if(text.includes("happy") || text.includes("good")) return "happy";
if(text.includes("sad") || text.includes("down")) return "sad";
if(text.includes("angry") || text.includes("mad")) return "angry";
if(text.includes("tired") || text.includes("sleep")) return "tired";

return "neutral";
}

function generateReply(mood){
if(mood==="happy") return "That's amazing 😊 Keep it up!";
if(mood==="sad") return "I'm here for you 💙 Things will get better.";
if(mood==="angry") return "Take a deep breath 💪 You got this.";
if(mood==="tired") return "You deserve some rest 😴";
return "I understand. Tell me more.";
}

function drawChart(){
let ctx = document.getElementById("chart");

if(chart) chart.destroy();

chart = new Chart(ctx,{
type:"pie",
data:{
labels:["Happy","Sad","Angry","Tired","Neutral"],
datasets:[{
data:Object.values(data)
}]
}
});
}

drawChart();
</script>

</body>
</html>
