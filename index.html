<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MoodMate</title>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: Arial;
    background: #eaf7f6;
    text-align: center;
    padding: 20px;
}

.container {
    background: white;
    padding: 20px;
    border-radius: 20px;
    max-width: 400px;
    margin: auto;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

button {
    font-size: 24px;
    margin: 5px;
    padding: 10px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

.response {
    margin-top: 15px;
    padding: 10px;
    background: #dff6f3;
    border-radius: 10px;
}

canvas {
    margin-top: 20px;
}
</style>
</head>

<body>

<div class="container">
    <h2>MoodMate 😊</h2>
    <p>How are you feeling today?</p>

    <button onclick="selectMood('happy')">😊</button>
    <button onclick="selectMood('sad')">😢</button>
    <button onclick="selectMood('angry')">😡</button>
    <button onclick="selectMood('tired')">😴</button>
    <button onclick="selectMood('neutral')">😐</button>

    <div class="response" id="response">Select your mood</div>

    <canvas id="moodChart"></canvas>
</div>

<script>
let moodData = JSON.parse(localStorage.getItem('moodData')) || {
    happy: 0,
    sad: 0,
    angry: 0,
    tired: 0,
    neutral: 0
};

let responses = {
    happy: "That's great! Keep it up 😊",
    sad: "It's okay to feel sad. I'm here for you 💙",
    angry: "Take a deep breath. You got this 💪",
    tired: "You deserve some rest 😴",
    neutral: "Hope your day gets even better ✨"
};

let chart;

function selectMood(mood) {
    moodData[mood]++;
    localStorage.setItem('moodData', JSON.stringify(moodData));

    document.getElementById('response').innerText = responses[mood];

    updateChart();
}

function updateChart() {
    const ctx = document.getElementById('moodChart');

    if (chart) chart.destroy();

    chart = new Chart(ctx, {
        type: 'pie',
        data: {
            labels: ['Happy', 'Sad', 'Angry', 'Tired', 'Neutral'],
            datasets: [{
                data: Object.values(moodData)
            }]
        }
    });
}

updateChart();
</script>

</body>
</html>
